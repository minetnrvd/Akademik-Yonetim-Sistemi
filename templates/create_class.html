{% extends "base.html" %}
{% block title %}{{ t('create_class') }}{% endblock %}
{% block content %}

<h2>{{ t('create_new_class') }}</h2>
<form method="POST">
    <label for="class_name">{{ t('class_name') }}:</label>

</form>
<a href="{{ url_for('teacher_dashboard') }}">{{ t('back') }}</a>

{% endblock %}
